site_name: mkdocs-rsoxs
site_description: A mkdocs theme for als rsoxs projects
site_url: https://als-rsoxs.github.io/mkdocs-rsoxs
repo_url: https://github.com/als-rsoxs/mkdocs-rsoxs
repo_name: als-rsoxs/mkdocs-rsoxs
edit_uri: edit/main/docs/

extra:
  als_group:
    full_name: ALS RSOXS Group Project
    acronym: REIXS
    github_url: https://github.com/ALS-RSOXS
    reixs_url: https://als.lbl.gov/science/photon-science-programs/rixs-program/

theme:
  name: rsoxs
  show_title: true
  show_stargazers: true
  topbar_sections: false
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - rsoxs
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            docstring_style: google
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      css_class: codehilite
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Configuration: configuration.md
  - API Reference: api.md
  - API Docs Best Practices: api-docs-best-practices.md
  - Contributing: contributing.md
